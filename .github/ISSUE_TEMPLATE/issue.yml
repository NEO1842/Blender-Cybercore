name: Bug Report
description: Report a bug
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: 🚨 What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 🎯 Expected behavior

  - type: textarea
    id: logs
    attributes:
      label: 📸 Logs / Screenshots
